<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <title>CivicEye Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    body { padding: 20px; }
    .admin-header { text-align: center; padding: 30px 0 20px; }
    .admin-header h1 { font-size: 2rem; color: var(--accent); }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--surface-border); color: var(--text); padding: 8px 18px; border-radius: 50px; text-decoration: none; font-size: 0.85rem; margin-bottom: 20px; transition: all 0.3s; }
    .back-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>
<div class="bg-anim" aria-hidden="true">
  <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
  <div class="particle-grid"></div>
  <canvas id="bg-canvas" class="bg-canvas"></canvas>
</div>
<div style="position:relative;z-index:1;max-width:1000px;margin:0 auto">
  <div class="admin-header">
    <div style="font-size:2.5rem;margin-bottom:8px">👁️</div>
    <h1>CivicEye Admin Dashboard</h1>
    <p style="color:var(--text-sub);margin-top:6px">Manage and monitor all civic reports</p>
  </div>
  <a href="/" class="back-btn">← Back to Portal</a>
  <div class="card">
    <h2 class="card-title">📋 All Reports</h2>
    <div class="table-wrap">
      <table class="reports-table" id="admin-table">
        <thead><tr><th>#</th><th>File</th><th>Category</th><th>Severity</th><th>Location</th><th>Date</th><th>Flags</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="admin-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
let dark = localStorage.getItem('civiceye-theme') || 'dark';
document.documentElement.setAttribute('data-theme', dark);

// ---- Snowflake/Seasonal Particle Animation ----
let particleCanvas = null;
let particleCtx = null;
let particles = [];
const maxParticles = 65;
let mouse = { x: null, y: null, radius: 150 };

function initParticles() {
  particleCanvas = document.getElementById('bg-canvas');
  if (!particleCanvas) return;
  particleCtx = particleCanvas.getContext('2d');
  
  resizeParticleCanvas();
  window.addEventListener('resize', resizeParticleCanvas);
  
  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  
  window.addEventListener('mouseleave', () => {
    mouse.x = null;
    mouse.y = null;
  });
  
  particles = [];
  for (let i = 0; i < maxParticles; i++) {
    particles.push(createParticle(true));
  }
  
  animateParticles();
}

function resizeParticleCanvas() {
  if (!particleCanvas) return;
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
}

function createParticle(randomY = false) {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  return {
    x: Math.random() * window.innerWidth,
    y: randomY ? Math.random() * window.innerHeight : -10,
    size: Math.random() * 3 + 1,
    speedY: Math.random() * 1 + 0.5,
    speedX: Math.random() * 0.5 - 0.25,
    opacity: Math.random() * 0.35 + 0.55,
    angle: Math.random() * Math.PI * 2,
    spin: Math.random() * 0.02 - 0.01
  };
}

function drawSnowflake(ctx, x, y, size, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(0.6, size * 0.15);
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (i * Math.PI) / 3;
    const endX = x + Math.cos(angle) * size;
    const endY = y + Math.sin(angle) * size;
    ctx.moveTo(x, y);
    ctx.lineTo(endX, endY);
    
    const subLength = size * 0.35;
    const branchAngle1 = angle - Math.PI / 4;
    const branchAngle2 = angle + Math.PI / 4;
    const subX = x + Math.cos(angle) * (size * 0.55);
    const subY = y + Math.sin(angle) * (size * 0.55);
    
    ctx.moveTo(subX, subY);
    ctx.lineTo(subX + Math.cos(branchAngle1) * subLength, subY + Math.sin(branchAngle1) * subLength);
    ctx.moveTo(subX, subY);
    ctx.lineTo(subX + Math.cos(branchAngle2) * subLength, subY + Math.sin(branchAngle2) * subLength);
  }
  ctx.stroke();
  ctx.restore();
}

function drawSparkleStar(ctx, x, y, size, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - size);
  ctx.quadraticCurveTo(x, y, x + size, y);
  ctx.quadraticCurveTo(x, y, x, y + size);
  ctx.quadraticCurveTo(x, y, x - size, y);
  ctx.quadraticCurveTo(x, y, x, y - size);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawParticleConnection(ctx, x1, y1, x2, y2, alpha, isDark) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const dist = Math.sqrt(dx * dx + dy * dy);
  
  const midX = x1 + dx * 0.5;
  const midY = y1 + dy * 0.5;
  const size = 3;
  const color = isDark ? `rgba(255, 255, 255, ${alpha * 2.8})` : `rgba(74, 58, 163, ${alpha * 2.5})`;
  
  if (isDark) {
    drawSparkleStar(ctx, midX, midY, size, color);
  } else {
    drawSnowflake(ctx, midX, midY, size, color);
  }

  // Draw stardust trail
  const step = 15;
  const count = Math.floor(dist / step);
  ctx.save();
  for (let i = 1; i < count; i++) {
    const t = i / count;
    const px = x1 + dx * t;
    const py = y1 + dy * t;
    ctx.beginPath();
    ctx.fillStyle = color;
    ctx.arc(px, py, 1.0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function spawnSparkles(x, y) {
  const count = 22;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1.5;
    particles.push({
      x: x,
      y: y,
      size: Math.random() * 2 + 1,
      speedY: Math.sin(angle) * speed - 1.2,
      speedX: Math.cos(angle) * speed,
      opacity: 1.0,
      angle: Math.random() * Math.PI * 2,
      spin: Math.random() * 0.08 - 0.04,
      isSparkle: true,
      life: 1.0,
      decay: Math.random() * 0.02 + 0.015
    });
  }
}

window.addEventListener('click', (e) => {
  spawnSparkles(e.clientX, e.clientY);
});

function animateParticles() {
  if (!particleCanvas || !particleCtx) return;
  
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  
  const maxDistance = 90;
  for (let i = 0; i < particles.length; i++) {
    if (particles[i].isSparkle) continue;
    for (let j = i + 1; j < particles.length; j++) {
      if (particles[j].isSparkle) continue;
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDistance) {
        const alpha = (1 - dist / maxDistance) * 0.12;
        drawParticleConnection(particleCtx, particles[i].x, particles[i].y, particles[j].x, particles[j].y, alpha, isDark);
      }
    }
  }
  
  // Draw connection lines to mouse cursor
  if (mouse.x !== null && mouse.y !== null) {
    for (let i = 0; i < particles.length; i++) {
      if (particles[i].isSparkle) continue;
      const dx = particles[i].x - mouse.x;
      const dy = particles[i].y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < mouse.radius) {
        const alpha = (1 - dist / mouse.radius) * 0.22;
        drawParticleConnection(particleCtx, particles[i].x, particles[i].y, mouse.x, mouse.y, alpha, isDark);
      }
    }
  }
  
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const baseColor = isDark ? `rgba(255, 255, 255, ${p.opacity})` : `rgba(74, 58, 163, ${p.opacity * 0.9})`;
    
    if (isDark) {
      if (p.size > 2.2) {
        drawSparkleStar(particleCtx, p.x, p.y, p.size * 2.5, baseColor);
      } else {
        particleCtx.beginPath();
        particleCtx.fillStyle = baseColor;
        particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        particleCtx.fill();
      }
    } else {
      if (p.size > 2.2) {
        drawSnowflake(particleCtx, p.x, p.y, p.size * 2, baseColor);
      } else {
        particleCtx.beginPath();
        particleCtx.fillStyle = baseColor;
        particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        particleCtx.fill();
      }
    }
    
    if (p.isSparkle) {
      p.y += p.speedY;
      p.x += p.speedX;
      p.speedY += 0.06;
      p.opacity -= p.decay;
      p.life -= p.decay;
      
      if (p.life <= 0) {
        particles.splice(i, 1);
        i--;
      }
    } else {
      p.y += p.speedY;
      p.x += p.speedX + Math.sin(p.angle) * 0.3;
      p.angle += p.spin;
      
      if (p.y > window.innerHeight + 10 || p.x > window.innerWidth + 10 || p.x < -10) {
        particles[i] = createParticle(false);
      }
    }
  }
  
  requestAnimationFrame(animateParticles);
}

async function loadReports() {
  const res = await fetch('/reports-list');
  const reports = await res.json();
  const tbody = document.getElementById('admin-tbody');
  const catIcons = {'Pothole':'🕳️','Garbage':'🗑️','Streetlight Issue':'💡','Flooding':'🌊','Open Manhole':'⚠️','Fallen Tree':'🌳','Other':'📍'};
  tbody.innerHTML = reports.map(r => `
    <tr>
      <td>#${r.id}</td>
      <td><a href="/uploads/${r.filename}" target="_blank" style="color:var(--accent2);font-size:0.78rem">${r.filename.substring(0,20)}</a></td>
      <td>${catIcons[r.category]||'📍'} ${r.category}</td>
      <td><span class="sev-chip ${r.severity}">${r.severity}</span></td>
      <td style="font-size:0.78rem">${r.place_name||'—'}</td>
      <td style="font-size:0.78rem">${r.timestamp||'—'}</td>
      <td style="font-size:0.78rem; font-weight:700;">🚩 ${r.flags_count || 1}</td>
      <td><span class="status-chip ${r.status}">${r.status}</span></td>
      <td>${r.status==='Active' ? `<button class="btn-resolve-sm" onclick="resolve(${r.id})">✅ Resolve</button>` : '—'}</td>
    </tr>
  `).join('');
}
async function resolve(id) {
  await fetch('/resolve/'+id,{method:'POST'});
  showToast('Report #'+id+' resolved');
  loadReports();
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
initParticles();
loadReports();
</script>
</body>
</html>
